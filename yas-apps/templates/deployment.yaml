{{- $total := len .Values.services -}}
{{- $i := 0 -}}
{{- range $serviceName, $config := .Values.services }}
{{- $i = add1 $i }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $serviceName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
    spec:
      containers:
      - name: {{ $serviceName }}
        image: "{{ if $config.image }}{{ $config.image }}{{ else }}{{ $.Values.global.registry }}/yas-{{ $serviceName }}:{{ $config.tag | default $.Values.global.defaultTag }}{{ end }}"
{{- if $config.args }}
        args:
{{ toYaml $config.args | indent 8 }}
{{- end }}
        ports:
        - containerPort: {{ $config.port }}
        env:
{{- if eq $serviceName "identity" }}
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://postgresql.dev.svc.cluster.local:5432/yas_{{ $serviceName }}"
        - name: KC_DB_USERNAME
          value: "postgres"
        - name: KC_DB_PASSWORD
          value: "yas_password"
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
{{- else }}
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgresql.dev.svc.cluster.local:5432/yas_{{ $serviceName }}"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "yas_password"
{{- end }}
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: PORT
          value: "{{ $config.port }}"
        - name: SERVER_PORT
          value: "{{ $config.port }}"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.dev.svc.cluster.local:9092"
{{- if eq $serviceName "identity" }}
        volumeMounts:
        - name: realm-import
          mountPath: /opt/keycloak/data/import
{{- end }}
{{- if eq $serviceName "identity" }}
      volumes:
      - name: realm-import
        configMap:
          name: identity-realm-import
{{- end }}
{{- if ne $i $total }}
---
{{- end }}
{{- end }}